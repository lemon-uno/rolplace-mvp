version: '3.8'

services:
  rolplace-mvp:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - N8N_CONTACT_WEBHOOK_URL=${N8N_CONTACT_WEBHOOK_URL}
    restart: unless-stopped
    networks:
      - rolplace-network

networks:
  rolplace-network:
    driver: bridge
